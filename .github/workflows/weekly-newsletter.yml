name: 🏆 Sport Weekly Newsletter

on:
  schedule:
    # Lundi 7h UTC = 8h (hiver) / 9h (été) heure de Paris
    - cron: '0 7 * * 1'

  workflow_dispatch:

jobs:
  newsletter:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 📦 Install dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: 🚀 Generate and send newsletters
        env:
          MAIL_SMTP_HOST: ${{ secrets.MAIL_SMTP_HOST }}
          MAIL_SMTP_PORT: ${{ secrets.MAIL_SMTP_PORT }}
          MAIL_SMTP_USER: ${{ secrets.MAIL_SMTP_USER }}
          MAIL_SMTP_PASSWORD: ${{ secrets.MAIL_SMTP_PASSWORD }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          MODEL_ID: ${{ secrets.MODEL_ID }}
          MAX_TOKENS: ${{ secrets.MAX_TOKENS }}
          TIMEZONE: Europe/Paris
        run: python run.py once

      - name: 📤 Upload newsletter output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: newsletters
          path: out/
          retention-days: 30
          if-no-files-found: ignore
